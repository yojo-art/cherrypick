# Static ActivityPub stub for federation tests (malformed remote emoji tags, etc.)

server {
	listen 80;
	listen [::]:80;
	server_name ${HOST};

	root /var/www/html;
	location /.well-known/acme-challenge/ { allow all; }
	location /.well-known/pki-validation/ { allow all; }
	location / { return 301 https://$server_name$request_uri; }
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name ${HOST};

	ssl_session_timeout 1d;
	ssl_session_cache shared:ssl_session_cache:10m;
	ssl_session_tickets off;

	ssl_trusted_certificate /etc/nginx/certificates/rootCA.crt;
	ssl_certificate /etc/nginx/certificates/$server_name.crt;
	ssl_certificate_key /etc/nginx/certificates/$server_name.key;

	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
	ssl_prefer_server_ciphers off;
	ssl_stapling on;
	ssl_stapling_verify on;

	root /var/www/stub;

	location / {
		default_type application/activity+json;
		try_files $uri $uri/ =404;
	}

	location ~ \.png$ {
		types {
			image/png png;
		}
		try_files $uri =404;
	}
}
